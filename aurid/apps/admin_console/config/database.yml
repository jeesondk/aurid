# Database configuration for Admin Console
# Uses PostgreSQL with UUID primary keys

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "aurid_admin" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "password" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  timeout: 5000
  variables:
    application_name: aurid_admin_console

development:
  <<: *default
  database: aurid_admin_console_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: aurid_admin_console_test

staging:
  <<: *default
  database: aurid_admin_console_staging
  username: <%= ENV.fetch("DATABASE_USERNAME") { "aurid_admin" } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV.fetch("DATABASE_HOST") { "db.aurid.io" } %>

production:
  <<: *default
  database: aurid_admin_console_production
  username: <%= ENV.fetch("DATABASE_USERNAME") { "aurid_admin" } %>
  password: <%= ENV["DATABASE_PASSWORD"] %>
  host: <%= ENV.fetch("DATABASE_HOST") { "db.aurid.io" } %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 25 } %>
  timeout: 5000
